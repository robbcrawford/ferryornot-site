# Static site — no build step; publish the repo root as-is.
[build]
  publish = "."

# Netlify domain aliases serve the same content rather than redirecting, so the
# .com → .app canonicalization has to be explicit. force=true beats the file that
# would otherwise be served. Netlify upgrades http→https first, so these cover both.
[[redirects]]
  from = "https://ferryornot.com/*"
  to = "https://ferryornot.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.ferryornot.com/*"
  to = "https://ferryornot.app/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long-cache the immutable brand images; HTML stays fresh.
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
